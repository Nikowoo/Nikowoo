name: Update Recent Project Link

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Recent Repo
        run: |
          # Replace 'YOUR_USERNAME' with your actual GitHub username
          # We sort by 'created' in 'desc' (descending) order to get the newest repo first
          RECENT_REPO=$(curl -s "https://api.github.com" | jq -r '.[0].html_url')
          
          echo "Found: $RECENT_REPO"
          
          # Update the file
          sed -i "s|<!-- RECENT_START -->.*<!-- RECENT_END -->|<!-- RECENT_START --><a href=\"$RECENT_REPO\">Recent</a><!-- RECENT_END -->|g" README.md
          
      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          # Only commit if something actually changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update recent project link" && git push)
